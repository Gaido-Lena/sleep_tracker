<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Lab Dashboard 🌙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: sans-serif; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .input-field { width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; margin-top: 0.25rem; }
        .btn-primary { background-color: #6366f1; color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; }
        .tab-btn { padding: 0.75rem 1rem; font-weight: 600; color: #64748b; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-btn.active { color: #6366f1; border-color: #6366f1; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-12">
    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="fixed inset-0 bg-slate-100 z-[100] flex items-center justify-center p-4">
        <div class="card p-8 w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6 text-indigo-900">Вход в Sleep Lab 🌙</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600">Email</label>
                    <input type="email" id="login-email" class="input-field" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600">Пароль</label>
                    <input type="password" id="login-password" class="input-field" required>
                </div>
                <button type="submit" id="login-btn" class="btn-primary w-full mt-4">Войти</button>
                <p id="login-error" class="text-rose-500 text-sm text-center hidden">Неверный логин или пароль</p>
            </form>
            <p class="text-xs text-slate-400 mt-4 text-center">Если вы используете GitHub Pages, убедитесь, что создали пользователя в консоли Firebase.</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main-content" class="max-w-5xl mx-auto px-4 pt-8 hidden">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <h1 class="text-3xl font-bold text-slate-900">Sleep Lab <span class="text-indigo-600">Secure</span> 🌙</h1>
                <button onclick="logout()" class="text-xs text-slate-400 hover:text-rose-500 underline">Выйти</button>
            </div>
            <nav class="flex bg-white rounded-xl shadow-sm border p-1">
                <button onclick="switchTab('form')" id="tab-form" class="tab-btn active">Ввод</button>
                <button onclick="switchTab('history')" id="tab-history" class="tab-btn">История</button>
                <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn">Аналитика</button>
            </nav>
        </header>

        <!-- VIEW: FORM -->
        <main id="view-form" class="space-y-6">
            <div class="card p-6">
                <form id="sleep-form" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Дата</label>
                        <input type="date" id="input-date" class="input-field" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Подъем (факт)</label>
                        <input type="time" id="input-wake" class="input-field" value="06:00">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Энергетики (шт)</label>
                        <input type="number" id="input-energy" class="input-field" value="1" min="0">
                    </div>

                    <!-- Основные метрики браслета -->
                    <div class="md:col-span-3 grid grid-cols-2 md:grid-cols-5 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-600">Заснула</label>
                            <input type="time" id="input-sleep-at" class="input-field">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-600">Баллы сна</label>
                            <input type="number" id="input-score" class="input-field" placeholder="0-100">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-600">Глубокий %</label>
                            <input type="number" id="input-deep" class="input-field">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-600">Пробуждения</label>
                            <input type="number" id="input-awakenings" class="input-field" placeholder="Кол-во">
                        </div>
                        <div class="flex gap-2">
                            <div class="flex-1">
                                <label class="block text-sm font-semibold text-slate-600">Всего ч.</label>
                                <input type="number" id="input-hours" class="input-field">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-semibold text-slate-600">мин.</label>
                                <input type="number" id="input-mins" class="input-field">
                            </div>
                        </div>
                    </div>

                    <div class="md:col-span-3 flex flex-wrap gap-6 py-2">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="input-migraine" class="w-4 h-4 text-indigo-600 rounded">
                            <span class="ml-2 text-sm font-medium text-slate-700">⚠️ Мигрень</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="input-rule20" class="w-4 h-4 text-indigo-600 rounded">
                            <span class="ml-2 text-sm font-medium text-slate-700">✅ Правило 20 мин</span>
                        </label>
                    </div>

                    <div class="md:col-span-3">
                        <button type="submit" id="submit-btn" class="btn-primary w-full md:w-auto">Сохранить в облако</button>
                    </div>
                </form>
            </div>
        </main>

        <!-- VIEW: HISTORY -->
        <section id="view-history" class="hidden card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Дата</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Баллы</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Сон (Всего)</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Глубокий %</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Пробужд.</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Мигрень</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </section>

        <!-- VIEW: STATS -->
        <section id="view-stats" class="hidden space-y-6">
            <div class="card p-6">
                <h3 class="font-bold text-slate-800 mb-4">Тренд качества сна (Баллы)</h3>
                <canvas id="chart-main" height="120"></canvas>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase Configuration ---
        // Dynamically use environment config if available, otherwise fall back to placeholders
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "ВАШ_API_KEY",
                authDomain: "ВАШ_PROJECT.firebaseapp.com",
                projectId: "ВАШ_PROJECT_ID",
                storageBucket: "ВАШ_PROJECT.appspot.com",
                messagingSenderId: "ВАШ_SENDER_ID",
                appId: "ВАШ_APP_ID"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-sleep-tracker';

        let sleepData = [];
        let chart = null;

        // AUTH INITIALIZATION
        async function attemptAutoAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } catch (e) {
                    console.error("Auto-auth failed, showing login screen");
                }
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                syncData();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
                attemptAutoAuth();
            }
        });

        // LOGIN FUNCTION
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');
            
            btn.disabled = true;
            btn.innerText = "Вход...";
            errorEl.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                errorEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "Войти";
            }
        };

        window.logout = () => signOut(auth);

        function syncData() {
            if (!auth.currentUser) return;
            // RULE 1: Strict Paths
            const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
            onSnapshot(logsRef, (snapshot) => {
                sleepData = snapshot.docs.map(doc => doc.data()).sort((a, b) => new Date(b.date) - new Date(a.date));
                updateUI();
            }, (error) => {
                console.error("Firestore sync error:", error);
            });
        }

        window.switchTab = (tab) => {
            ['form', 'history', 'stats'].forEach(t => document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tab));
            ['tab-form', 'tab-history', 'tab-stats'].forEach(t => document.getElementById(t).classList.toggle('active', t === `tab-${tab}`));
            if (tab === 'stats') renderChart();
        };

        document.getElementById('sleep-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Сохранение...";

            const date = document.getElementById('input-date').value;
            const entry = {
                date,
                wake: document.getElementById('input-wake').value,
                energy: parseInt(document.getElementById('input-energy').value) || 0,
                score: parseInt(document.getElementById('input-score').value) || 0,
                deep: parseInt(document.getElementById('input-deep').value) || 0,
                awakenings: parseInt(document.getElementById('input-awakenings').value) || 0,
                totalMinutes: (parseInt(document.getElementById('input-hours').value) || 0) * 60 + (parseInt(document.getElementById('input-mins').value) || 0),
                migraine: document.getElementById('input-migraine').checked,
                rule20: document.getElementById('input-rule20').checked,
                sleepAt: document.getElementById('input-sleep-at').value || "--:--",
                updatedAt: new Date().toISOString()
            };

            try {
                // RULE 1: Strict Paths
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'logs', date);
                await setDoc(docRef, entry);
                alert("Данные синхронизированы!");
            } catch (err) {
                console.error("Save error:", err);
                alert("Ошибка доступа. Убедитесь, что вы авторизованы.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Сохранить в облако";
            }
        };

        function updateUI() {
            const body = document.getElementById('history-body');
            body.innerHTML = sleepData.map(d => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 text-sm font-medium text-slate-700">${new Date(d.date).toLocaleDateString('ru-RU')}</td>
                    <td class="p-4 text-sm"><span class="px-2 py-1 bg-indigo-100 text-indigo-700 rounded font-bold">${d.score || 0}</span></td>
                    <td class="p-4 text-sm text-slate-600">${Math.floor(d.totalMinutes/60)}ч ${d.totalMinutes%60}м</td>
                    <td class="p-4 text-sm text-slate-600">${d.deep}%</td>
                    <td class="p-4 text-sm text-slate-600">${d.awakenings || 0}</td>
                    <td class="p-4 text-sm">${d.migraine ? '<span class="text-rose-500 font-bold">⚠️ Да</span>' : 'Нет'}</td>
                </tr>
            `).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('chart-main').getContext('2d');
            const sorted = [...sleepData].sort((a,b) => new Date(a.date) - new Date(b.date));
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sorted.map(d => new Date(d.date).toLocaleDateString('ru-RU', {day:'numeric', month:'short'})),
                    datasets: [{ 
                        label: 'Баллы сна', 
                        data: sorted.map(d => d.score), 
                        borderColor: '#6366f1', 
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.3 
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { min: 0, max: 100 } }
                }
            });
        }

        document.getElementById('input-date').valueAsDate = new Date();
    </script>
</body>
</html>
